version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/web.dockerfile
    ports:
      - "8000:8000"
    env_file: ../.env
    volumes:
      - ../data:/app/data
    networks:
      - docker_task_default
    restart: unless-stopped

networks:
  docker_task_default:
    external: true   # 接入现有 docker_task 网络，直连 postgres 容器
